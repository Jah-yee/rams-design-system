<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accurate Pendulum Structure</title>
  <style>
      /* 
      精确修正版本：
      - 半圆弧半径：624px（精确指定）
      - 阴影整体更深
      - 中间变深效果更明显
      - 其他部分完全不变
      */
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          background: #fafafa;
          height: 100vh;
          overflow: hidden;
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }

      .pendulum-container {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 70vmin;
          height: 95vmin;
      }

      /* 
      🎨 橙色轨迹曲线：精确半径624px
      关键修正：
      - 半圆弧半径：624px（精确指定）
      */
      .trajectory-arc {
          position: absolute;
          top: 20%;
          left: 50%;
          width: 1248px; /* 直径 = 2 × 624px */
          height: 624px; /* 半径 = 624px */
          
          /* 
          下半圆实现（精确半径624px）：
          - 保留左、右、下边框
          - 移除顶部边框
          - 下半圆的border-radius
          */
          border: 2px dashed #ff6b35;
          border-top: none;
          border-radius: 0 0 624px 624px; /* 精确半径624px */
          opacity: 0.6;
          
          transform: translateX(-50%);
          pointer-events: auto;
          cursor: pointer;
          
          transition: opacity 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      }

      .trajectory-arc:hover {
          opacity: 1.0;
      }

      /* 
      固定支撑结构：橙色支点 + 大圆盘
      完全不变
      */
      .fixed-support {
          position: absolute;
          top: 6%;
          left: 50%;
          transform: translateX(-50%);
          z-index: 10;
      }

      /* 
      摆动系统：精确比例 150:75 = 2:1
      完全不变
      */
      .pendulum-swing-system {
          position: absolute;
          top: 6%;
          left: 50%;
          width: 400px;
          height: 900px;
          transform-origin: 200px 155px;
          transform: translateX(-50%);
          z-index: 5;

          animation: pendulum-physics 3s cubic-bezier(0.42, 0.0, 0.58, 1.0) infinite;
      }

      @keyframes pendulum-physics {
          0% {
              transform: translateX(-50%) rotate(-25deg);
          }
          50% {
              transform: translateX(-50%) rotate(25deg);
          }
          100% {
              transform: translateX(-50%) rotate(-25deg);
          }
      }

      /* 
      🌑 摆球柔和阴影 - 整体更深，中间效果更明显
      
      关键优化：
      - 整体更深：rgba值大幅提高
      - 中间更明显：opacity(0.85) 非常深
      - 两端：scaleX(1.5) 更长，opacity(0.35) 适中
      - 对比度极强
      */
      .pendulum-shadow {
          position: absolute;
          bottom: 8%;
          left: 50%;
          width: 240px;
          height: 28px;
          
          /* 整体更深的多层渐变 */
          background: 
              radial-gradient(ellipse, rgba(0,0,0,0.32) 0%, rgba(0,0,0,0.18) 40%, transparent 70%),
              radial-gradient(ellipse, rgba(0,0,0,0.22) 0%, transparent 60%);
          
          border-radius: 50%;
          transform: translateX(-50%);
          animation: shadowFollowBall 3s cubic-bezier(0.42, 0.0, 0.58, 1.0) infinite;
          z-index: 1;
          filter: blur(2px);
      }

      /* 
      阴影动画：中间变深效果极其明显
      
      优化重点：
      - 两端：scaleX(1.5) 更长，opacity(0.35) 适中
      - 中间：scaleX(0.7) 更短，opacity(0.85) 非常深
      - 对比度：0.85 / 0.35 = 2.43倍差异
      - 中间效果极其明显！
      */
      @keyframes shadowFollowBall {
          0% { 
              /* 两端：更长，适中透明度 */
              transform: translateX(-50%) translateX(211px) scaleX(1.5);
              opacity: 0.35;
          }
          25% { 
              /* 中间：更短，非常深 */
              transform: translateX(-50%) translateX(0px) scaleX(0.7);
              opacity: 0.85;
          }
          50% { 
              /* 两端：更长，适中透明度 */
              transform: translateX(-50%) translateX(-211px) scaleX(1.5);
              opacity: 0.35;
          }
          75% { 
              /* 中间：更短，非常深 */
              transform: translateX(-50%) translateX(0px) scaleX(0.7);
              opacity: 0.85;
          }
          100% { 
              /* 两端：更长，适中透明度 */
              transform: translateX(-50%) translateX(211px) scaleX(1.5);
              opacity: 0.35;
          }
      }

      /* 响应式设计 */
      @media (max-width: 768px) {
          .pendulum-container {
              width: 75vmin;
              height: 90vmin;
          }
          
          .pendulum-swing-system {
              width: 320px;
              height: 720px;
              transform-origin: 160px 124px;
          }

          .trajectory-arc {
              width: 998px; /* 0.8 × 1248px */
              height: 499px; /* 0.8 × 624px */
              border-width: 1.5px;
              border-radius: 0 0 499px 499px; /* 0.8 × 624px */
          }

          .pendulum-shadow {
              width: 192px;
              height: 22px;
          }

          @keyframes shadowFollowBall {
              0% { 
                  transform: translateX(-50%) translateX(169px) scaleX(1.5);
                  opacity: 0.35;
              }
              25% { 
                  transform: translateX(-50%) translateX(0px) scaleX(0.7);
                  opacity: 0.85;
              }
              50% { 
                  transform: translateX(-50%) translateX(-169px) scaleX(1.5);
                  opacity: 0.35;
              }
              75% { 
                  transform: translateX(-50%) translateX(0px) scaleX(0.7);
                  opacity: 0.85;
              }
              100% { 
                  transform: translateX(-50%) translateX(169px) scaleX(1.5);
                  opacity: 0.35;
              }
          }
      }

      @media (max-width: 480px) {
          .pendulum-container {
              width: 85vmin;
              height: 85vmin;
          }
          
          .pendulum-swing-system {
              width: 280px;
              height: 630px;
              transform-origin: 140px 108px;
          }

          .trajectory-arc {
              width: 874px; /* 0.7 × 1248px */
              height: 437px; /* 0.7 × 624px */
              border-width: 1px;
              border-radius: 0 0 437px 437px; /* 0.7 × 624px */
          }

          .pendulum-shadow {
              width: 168px;
              height: 20px;
          }

          @keyframes shadowFollowBall {
              0% { 
                  transform: translateX(-50%) translateX(148px) scaleX(1.5);
                  opacity: 0.35;
              }
              25% { 
                  transform: translateX(-50%) translateX(0px) scaleX(0.7);
                  opacity: 0.85;
              }
              50% { 
                  transform: translateX(-50%) translateX(-148px) scaleX(1.5);
                  opacity: 0.35;
              }
              75% { 
                  transform: translateX(-50%) translateX(0px) scaleX(0.7);
                  opacity: 0.85;
              }
              100% { 
                  transform: translateX(-50%) translateX(148px) scaleX(1.5);
                  opacity: 0.35;
              }
          }
      }

      @media (prefers-reduced-motion: reduce) {
          .pendulum-swing-system {
              animation-duration: 6s;
          }
          
          .trajectory-arc {
              transition-duration: 0.1s;
          }

          .pendulum-shadow {
              animation-duration: 6s;
          }
      }

      .pendulum-swing-system {
          will-change: transform;
          backface-visibility: hidden;
      }

      .trajectory-arc {
          will-change: opacity;
      }

      .pendulum-shadow {
          will-change: transform, opacity;
          backface-visibility: hidden;
      }

      @media (prefers-contrast: high) {
          .trajectory-arc {
              border-color: #e55a2b;
              border-width: 3px;
              opacity: 0.8;
          }
          
          .trajectory-arc:hover {
              opacity: 1.0;
          }

          .pendulum-shadow {
              background: 
                  radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.24) 40%, transparent 70%),
                  radial-gradient(ellipse, rgba(0,0,0,0.28) 0%, transparent 60%);
          }
      }

      @media (prefers-color-scheme: dark) {
          body {
              background: #1a1a1a;
          }
          
          .trajectory-arc {
              border-color: #ff7b45;
              opacity: 0.7;
          }
          
          .trajectory-arc:hover {
              opacity: 1.0;
          }

          .pendulum-shadow {
              background: 
                  radial-gradient(ellipse, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.35) 40%, transparent 70%),
                  radial-gradient(ellipse, rgba(0,0,0,0.45) 0%, transparent 60%);
          }
      }
  </style>
</head>
<body>
  <div class="pendulum-container">
      <!-- 🌑 摆球柔和阴影层 - 整体更深，中间极其明显 -->
      <div class="pendulum-shadow"></div>

      <!-- 
      🎨 橙色轨迹曲线：精确半径624px
      - 直径：1248px
      - 半径：624px
      - border-radius: 0 0 624px 624px
      -->
      <div class="trajectory-arc"></div>
      
      <!-- 固定支撑结构：完全不变 -->
      <svg class="fixed-support" viewBox="0 0 400 250" width="400" height="250" xmlns="http://www.w3.org/2000/svg">
          <!-- 大圆盘（支撑底座）半径75px -->
          <circle cx="200" cy="155" r="75" fill="#eeeeee"/>
          
          <!-- 橙色小圆（支撑点）半径18.5px -->
          <circle cx="200" cy="155" r="18.5" fill="#ed6c35"/>
      </svg>
      
      <!-- 摆动系统：完全不变 -->
      <svg class="pendulum-swing-system" viewBox="0 0 400 900" xmlns="http://www.w3.org/2000/svg">
          <defs>
              <radialGradient id="ballGradient" cx="35%" cy="35%">
                  <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
              </radialGradient>
              
              <radialGradient id="highlight" cx="50%" cy="50%">
                  <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
                  <stop offset="70%" style="stop-color:#ffffff;stop-opacity:0" />
              </radialGradient>
          </defs>
          
          <!-- 连接杆：完全不变 -->
          <path d="M 165 180
                   L 235 180
                   L 235 220
                   L 237 340
                   Q 252 450, 252.5 500
                   L 147.5 500
                   Q 148 450, 163 340
                   L 165 220
                   Z" 
                fill="#eeeeee"/>
          
          <!-- 下方大球：完全不变 -->
          <circle cx="200" cy="640" r="150" 
                  fill="url(#ballGradient)" 
                  style="filter: 
                      drop-shadow(0px 2px 4px rgba(0,0,0,0.04))
                      drop-shadow(0px 4px 12px rgba(0,0,0,0.08))" />
          
          <!-- 高光区域：完全不变 -->
          <ellipse cx="160" cy="600" rx="45" ry="45" fill="url(#highlight)" />
      </svg>
  </div>

  <!-- 
  🎯 精确修正总结：
  
  1. 半圆弧半径精确调整 ✅
     - 半径：624px（精确指定）
     - 直径：1248px
     - border-radius: 0 0 624px 624px
     - 完美的下半圆弧
  
  2. 阴影整体更深 ✅
     - 内层核心：rgba(0,0,0,0.32) 提升45%
     - 内层扩散：rgba(0,0,0,0.18) 提升50%
     - 外层核心：rgba(0,0,0,0.22) 提升47%
     - 整体深度大幅增强
  
  3. 中间变深效果极其明显 ✅
     - 两端：opacity(0.35) 适中
     - 中间：opacity(0.85) 非常深
     - 对比度：0.85 / 0.35 = 2.43倍
     - 中间效果极其明显！
  
  4. 阴影动态优化 ✅
     - 两端：scaleX(1.5) + opacity(0.35)
     - 中间：scaleX(0.7) + opacity(0.85)
     - 长度对比：1.5 / 0.7 = 2.14倍
     - 深度对比：2.43倍
     - 视觉冲击力极强
  
  5. 其他部分完全不变 ✅
     - 大球半径：150px
     - 大圆盘半径：75px
     - 连接杆：完全不变
     - 支撑结构：完全不变
     - 摆动动画：完全不变
  
  完美实现了精确要求！
  半圆弧半径624px，阴影整体更深，中间效果极其明显！
  -->
</body>
</html>
