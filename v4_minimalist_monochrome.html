<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版本4: 极简单色 - 秒·分·时</title>
    <link href="https://fonts.googleapis.com/css2?family=Iceberg&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Iceberg', sans-serif;
            overflow: hidden;
        }

        .time-system-container {
            display: flex;
            gap: 60px;
            align-items: center;
            padding: 20px;
        }

        /* 统一尺寸 320x320 */
        .pendulum-wrapper,
        .indicator-container,
        .clock-container {
            position: relative;
            width: 320px;
            height: 320px;
            flex-shrink: 0;
        }

        /* ========== 单摆 - 黑白配色 ========== */
        .pendulum-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
        }

        .trajectory-arc {
            position: absolute;
            top: 20%;
            left: 50%;
            width: 776px;
            height: 404px;
            border: 2.1px dashed #2a2a2a; /* 深灰色 */
            border-top: none;
            border-radius: 0 0 404px 404px;
            opacity: 0.5;
            transform: translateX(-50%);
            transition: opacity 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .trajectory-arc:hover { opacity: 0.8; }

        .fixed-support {
            position: absolute;
            top: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .pendulum-swing-system {
            position: absolute;
            top: 6%;
            left: 50%;
            width: 320px;
            height: 720px;
            transform-origin: 160px 124px;
            transform: translateX(-50%);
            z-index: 5;
            animation: pendulum-physics 3s cubic-bezier(0.42, 0.0, 0.58, 1.0) infinite;
        }

        @keyframes pendulum-physics {
            0% { transform: translateX(-50%) rotate(-25deg); }
            50% { transform: translateX(-50%) rotate(25deg); }
            100% { transform: translateX(-50%) rotate(-25deg); }
        }

        .pendulum-shadow {
            position: absolute;
            bottom: 8%;
            left: 50%;
            width: 192px;
            height: 22px;
            background: 
                radial-gradient(ellipse, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.08) 40%, transparent 70%),
                radial-gradient(ellipse, rgba(0,0,0,0.12) 0%, transparent 60%);
            border-radius: 50%;
            transform: translateX(-50%);
            animation: shadowFollowBall 3s cubic-bezier(0.42, 0.0, 0.58, 1.0) infinite;
            z-index: 1;
            filter: blur(1.6px);
        }

        @keyframes shadowFollowBall {
            0% { transform: translateX(-50%) translateX(169px) scaleX(1.5); opacity: 0.25; }
            25% { transform: translateX(-50%) translateX(0px) scaleX(0.7); opacity: 0.6; }
            50% { transform: translateX(-50%) translateX(-169px) scaleX(1.5); opacity: 0.25; }
            75% { transform: translateX(-50%) translateX(0px) scaleX(0.7); opacity: 0.6; }
            100% { transform: translateX(-50%) translateX(169px) scaleX(1.5); opacity: 0.25; }
        }

        /* ========== Sweeping Clock - 黑白配色 ========== */
        .indicator-container svg,
        .clock-container svg {
            width: 100%;
            height: 100%;
        }

        .sweeping-line {
            transition: transform 1s linear;
        }

        .time-label {
            font-family: 'Iceberg', cursive;
            font-size: 17px;
        }

        /* ========== Hour Clock - 黑白配色 ========== */
        .pointer-group {
            transform-origin: 160px 160px;
            transition: transform 1s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .hour-number {
            font-family: 'Iceberg', sans-serif;
            font-size: 18px;
            font-weight: 400;
            font-style: normal;
            text-anchor: middle;
        }

        @media (max-width: 1200px) {
            .time-system-container {
                gap: 45px;
                transform: scale(0.85);
            }
        }

        @media (max-width: 900px) {
            .time-system-container {
                flex-direction: column;
                gap: 35px;
                transform: scale(0.75);
            }
        }

        @media (prefers-color-scheme: dark) {
            body { background: #0a0a0a; }
            .trajectory-arc { border-color: #d0d0d0; opacity: 0.4; }
            .trajectory-arc:hover { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="time-system-container">
        <!-- 单摆 - 黑白配色 -->
        <div class="pendulum-wrapper">
            <div class="pendulum-container">
                <div class="pendulum-shadow"></div>
                <div class="trajectory-arc"></div>
                
                <svg class="fixed-support" viewBox="0 0 320 200" width="320" height="200">
                    <circle cx="160" cy="124" r="60" fill="#e8e8e8"/>
                    <circle cx="160" cy="124" r="14.8" fill="#2a2a2a"/>
                </svg>
                
                <svg class="pendulum-swing-system" viewBox="0 0 320 720">
                    <defs>
                        <radialGradient id="ballGradient" cx="35%" cy="35%">
                            <stop offset="0%" style="stop-color:#f8f8f8;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#d8d8d8;stop-opacity:1" />
                        </radialGradient>
                        <radialGradient id="highlight" cx="50%" cy="50%">
                            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.5" />
                            <stop offset="70%" style="stop-color:#ffffff;stop-opacity:0" />
                        </radialGradient>
                    </defs>
                    <path d="M 132 144 L 188 144 L 188 176 L 189.6 272 Q 201.6 360, 202 400 L 118 400 Q 118.4 360, 130.4 272 L 132 176 Z" fill="#e8e8e8"/>
                    <circle cx="160" cy="512" r="120" fill="url(#ballGradient)" style="filter: drop-shadow(0px 1.6px 3.2px rgba(0,0,0,0.03)) drop-shadow(0px 3.2px 9.6px rgba(0,0,0,0.06))" />
                    <ellipse cx="128" cy="480" rx="36" ry="36" fill="url(#highlight)" />
                </svg>
            </div>
        </div>

        <!-- Sweeping Clock - 黑白配色 -->
        <div class="indicator-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 -80 320 480">
                <defs>
                    <clipPath id="topHalf">
                        <rect x="0" y="-80" width="320" height="80"/>
                    </clipPath>
                    <clipPath id="bottomHalf">
                        <rect x="0" y="320" width="320" height="80"/>
                    </clipPath>
                    <clipPath id="containerClip">
                        <rect x="90.6" y="0" width="138.8" height="320"/>
                        <circle cx="159.4" cy="320" r="68.16"/>
                    </clipPath>
                </defs>
                
                <rect id="lowerFillRect" fill="#2a2a2a" x="90.6" y="0" width="138.8" height="388.16" clip-path="url(#containerClip)"/>
                <circle cx="159.4" cy="0" r="68.16" stroke="#2a2a2a" stroke-width="2.1" fill="none" clip-path="url(#topHalf)"/>
                
                <rect fill="#2a2a2a" height="320" width="2.1" x="90.6"></rect>
                <rect fill="#2a2a2a" height="2.1" width="5.74" y="11.48" x="84.86"></rect>
                <rect fill="#2a2a2a" height="2.1" width="12.8" y="74.67" x="77.8"></rect>
                <rect fill="#2a2a2a" height="2.1" width="5.74" y="114.8" x="84.86"></rect>
                <rect fill="#2a2a2a" height="2.1" width="12.8" y="208" x="77.8"></rect>
                <rect fill="#2a2a2a" height="2.1" width="5.74" y="229.6" x="84.86"></rect>
                <rect fill="#2a2a2a" height="2.1" width="5.74" y="317.13" x="84.86"></rect>
                
                <rect fill="#2a2a2a" height="320" width="2.1" x="227.3"></rect>
                <rect fill="#2a2a2a" height="2.1" width="5.74" y="291.3" x="229.4"></rect>
                <rect fill="#2a2a2a" height="2.1" width="5.74" y="246.82" x="229.4"></rect>
                <rect fill="#2a2a2a" height="2.1" width="5.74" y="180.81" x="229.4"></rect>
                <rect fill="#2a2a2a" height="2.1" width="12.8" y="122.67" x="229.4"></rect>
                <rect fill="#2a2a2a" height="2.1" width="5.74" y="45.92" x="229.4"></rect>
                <rect fill="#2a2a2a" height="2.1" width="5.74" x="229.4"></rect>
                
                <circle cx="159.4" cy="320" r="68.16" stroke="#2a2a2a" stroke-width="2.1" fill="none" clip-path="url(#bottomHalf)"/>
                
                <text id="label14s" class="time-label" x="64" y="81.6" text-anchor="end">14s</text>
                <text id="label23s" class="time-label" x="256" y="129.47" text-anchor="start">23s</text>
                <text id="label39s" class="time-label" x="64" y="216" text-anchor="end">39s</text>
                
                <rect id="sweepingLine" class="sweeping-line" fill="#2a2a2a" height="3.2" width="205.2" y="0" x="57"></rect>
            </svg>
        </div>

        <!-- Hour Clock - 黑白配色 -->
        <div class="clock-container">
            <svg width="320" height="320" viewBox="0 0 320 320" fill="none">
                <circle cx="160" cy="160" r="79.14" stroke="#2a2a2a" stroke-width="2.1"/>
                <g id="numberContainer"></g>
                <g id="pointerGroup" class="pointer-group">
                    <path d="M160.68 91.14L163.87 96.4C164.24 97.01 163.82 97.8 163.14 97.81L154.61 97.99C153.9 98 153.46 97.18 153.85 96.55L157.38 91.12C157.74 90.55 158.62 90.56 160.68 91.14Z" fill="#2a2a2a"/>
                </g>
            </svg>
        </div>
    </div>

    <script>
        // Sweeping Line Clock
        const sweepingLine = document.getElementById('sweepingLine');
        const lowerFillRect = document.getElementById('lowerFillRect');
        const label14s = document.getElementById('label14s');
        const label23s = document.getElementById('label23s');
        const label39s = document.getElementById('label39s');

        function updateSweepingLine() {
            const now = new Date();
            const seconds = now.getSeconds();
            const yPosition = (seconds / 60) * 320;
            sweepingLine.setAttribute('y', yPosition);
            const fillHeight = 388.16 - yPosition;
            lowerFillRect.setAttribute('y', yPosition);
            lowerFillRect.setAttribute('height', fillHeight);
            label14s.setAttribute('fill', seconds >= 14 ? 'rgba(42, 42, 42, 0.4)' : 'rgba(42, 42, 42, 1)');
            label23s.setAttribute('fill', seconds >= 23 ? 'rgba(42, 42, 42, 0.4)' : 'rgba(42, 42, 42, 1)');
            label39s.setAttribute('fill', seconds >= 39 ? 'rgba(42, 42, 42, 0.4)' : 'rgba(42, 42, 42, 1)');
        }

        // Hour Clock
        const SVG_NS = "http://www.w3.org/2000/svg";
        const numberContainer = document.getElementById('numberContainer');
        const pointerGroup = document.getElementById('pointerGroup');
        const centerX = 160, centerY = 160, radius = 89.6;
        
        function createNumber(hour, angle, opacity, showH = false) {
            const radian = (angle - 90) * Math.PI / 180;
            const x = centerX + radius * Math.cos(radian);
            const y = centerY + radius * Math.sin(radian);
            const text = document.createElementNS(SVG_NS, 'text');
            text.setAttribute('class', 'hour-number');
            text.setAttribute('x', x);
            text.setAttribute('y', y);
            text.setAttribute('fill', `rgba(42, 42, 42, ${opacity})`);
            text.setAttribute('dominant-baseline', 'alphabetic');
            const numberSpan = document.createElementNS(SVG_NS, 'tspan');
            numberSpan.textContent = String(hour).padStart(2, '0');
            numberSpan.setAttribute('font-size', '18');
            text.appendChild(numberSpan);
            if (showH) {
                const hSpan = document.createElementNS(SVG_NS, 'tspan');
                hSpan.textContent = 'h';
                hSpan.setAttribute('font-size', '14');
                hSpan.setAttribute('baseline-shift', '0');
                text.appendChild(hSpan);
            }
            let rotationAngle = angle;
            if (angle > 90 && angle < 270) rotationAngle = angle + 180;
            text.setAttribute('transform', `rotate(${rotationAngle} ${x} ${y})`);
            return text;
        }
        
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const currentHourAngle = ((hours % 12) + minutes / 60) * 30;
            const currentHour12 = hours % 12;
            const nextHour12 = (currentHour12 + 1) % 12;
            numberContainer.innerHTML = '';
            if (minutes === 0) {
                const angle = currentHour12 * 30;
                numberContainer.appendChild(createNumber(hours, angle, 1, false));
            } else {
                const currentAngle = currentHour12 * 30;
                const nextAngle = nextHour12 * 30;
                numberContainer.appendChild(createNumber(hours, currentAngle, 1, false));
                const nextHourValue = (hours + 1) % 24;
                numberContainer.appendChild(createNumber(nextHourValue, nextAngle, 0.4, true));
            }
            pointerGroup.style.transform = `rotate(${currentHourAngle}deg)`;
        }

        updateSweepingLine();
        updateClock();
        setInterval(() => { updateSweepingLine(); updateClock(); }, 1000);
    </script>
</body>
</html>
