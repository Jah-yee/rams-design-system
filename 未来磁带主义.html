<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来磁带主义 UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0d0221 100%);
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 背景动画 */
        @keyframes scanlines {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(10px);
            }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 136, 0.03),
                rgba(0, 255, 136, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            animation: scanlines 8s linear infinite;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 600px;
        }

        /* 磁带卡带容器 */
        .cassette-player {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 3px solid #00ff88;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 0 20px rgba(0, 255, 136, 0.5),
                0 0 40px rgba(255, 0, 255, 0.3),
                inset 0 0 20px rgba(0, 255, 136, 0.1);
            backdrop-filter: blur(10px);
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #ff00ff;
            letter-spacing: 3px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 10px #00ff88, 0 0 20px #ff00ff;
            }
            50% {
                text-shadow: 0 0 20px #00ff88, 0 0 40px #ff00ff, 0 0 60px #00ffff;
            }
        }

        /* 磁带显示区 */
        .tape-display {
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .tape-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .tape-label {
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        .tape-value {
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff;
        }

        /* 播放条 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #0a0a0a;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ffff);
            width: 45%;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 10px #00ff88;
            }
            50% {
                box-shadow: 0 0 20px #00ff88, 0 0 30px #00ffff;
            }
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn {
            width: 50px;
            height: 50px;
            border: 2px solid #00ff88;
            background: linear-gradient(145deg, #1a1a2e, #0f3460);
            color: #00ff88;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            text-shadow: 0 0 5px #00ff88;
        }

        .btn:hover {
            background: linear-gradient(145deg, #0f3460, #1a1a2e);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8), 0 0 30px rgba(255, 0, 255, 0.5);
            transform: scale(1.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-play {
            width: 60px;
            height: 60px;
            border-color: #ff00ff;
            color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
            text-shadow: 0 0 5px #ff00ff;
        }

        .btn-play:hover {
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8), 0 0 40px rgba(0, 255, 136, 0.5);
        }

        /* 音量控制 */
        .volume-control {
            margin-bottom: 30px;
        }

        .volume-label {
            font-size: 12px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #00ffff;
        }

        .volume-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #00ff88, #ff00ff);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            box-shadow: 0 0 10px #00ff88;
        }

        .volume-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px #00ff88;
        }

        /* 频谱显示 */
        .spectrum {
            display: flex;
            gap: 4px;
            justify-content: center;
            align-items: flex-end;
            height: 60px;
            margin-bottom: 20px;
        }

        .bar {
            width: 6px;
            background: linear-gradient(180deg, #ff00ff, #00ff88);
            border-radius: 3px;
            box-shadow: 0 0 8px #00ff88;
            animation: dance 0.5s ease-in-out infinite;
        }

        .bar:nth-child(1) { height: 30%; animation-delay: 0s; }
        .bar:nth-child(2) { height: 50%; animation-delay: 0.1s; }
        .bar:nth-child(3) { height: 70%; animation-delay: 0.2s; }
        .bar:nth-child(4) { height: 60%; animation-delay: 0.3s; }
        .bar:nth-child(5) { height: 80%; animation-delay: 0.4s; }
        .bar:nth-child(6) { height: 55%; animation-delay: 0.5s; }
        .bar:nth-child(7) { height: 75%; animation-delay: 0.6s; }
        .bar:nth-child(8) { height: 40%; animation-delay: 0.7s; }
