<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版本2: 递进式黄金比例 - 秒·分·时</title>
    <link href="https://fonts.googleapis.com/css2?family=Iceberg&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Iceberg', sans-serif;
            overflow: hidden;
        }

        .time-system-container {
            display: flex;
            gap: 50px;
            align-items: center;
            padding: 20px;
        }

        /* 递进尺寸：240 → 300 → 388 */
        .pendulum-wrapper {
            width: 240px;
            height: 240px;
        }

        .indicator-container {
            width: 300px;
            height: 300px;
        }

        .clock-container {
            width: 388px;
            height: 388px;
        }

        .pendulum-wrapper,
        .indicator-container,
        .clock-container {
            position: relative;
            flex-shrink: 0;
        }

        /* ========== 单摆 240px ========== */
        .pendulum-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
        }

        .trajectory-arc {
            position: absolute;
            top: 20%;
            left: 50%;
            width: 582px;
            height: 303px;
            border: 2px dashed #FF5D1F;
            border-top: none;
            border-radius: 0 0 303px 303px;
            opacity: 0.6;
            transform: translateX(-50%);
            transition: opacity 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .trajectory-arc:hover { opacity: 1.0; }

        .fixed-support {
            position: absolute;
            top: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .pendulum-swing-system {
            position: absolute;
            top: 6%;
            left: 50%;
            width: 240px;
            height: 540px;
            transform-origin: 120px 93px;
            transform: translateX(-50%);
            z-index: 5;
            animation: pendulum-physics 3s cubic-bezier(0.42, 0.0, 0.58, 1.0) infinite;
        }

        @keyframes pendulum-physics {
            0% { transform: translateX(-50%) rotate(-25deg); }
            50% { transform: translateX(-50%) rotate(25deg); }
            100% { transform: translateX(-50%) rotate(-25deg); }
        }

        .pendulum-shadow {
            position: absolute;
            bottom: 8%;
            left: 50%;
            width: 144px;
            height: 17px;
            background: 
                radial-gradient(ellipse, rgba(0,0,0,0.32) 0%, rgba(0,0,0,0.18) 40%, transparent 70%),
                radial-gradient(ellipse, rgba(0,0,0,0.22) 0%, transparent 60%);
            border-radius: 50%;
            transform: translateX(-50%);
            animation: shadowFollowBall 3s cubic-bezier(0.42, 0.0, 0.58, 1.0) infinite;
            z-index: 1;
            filter: blur(1.2px);
        }

        @keyframes shadowFollowBall {
            0% { transform: translateX(-50%) translateX(127px) scaleX(1.5); opacity: 0.35; }
            25% { transform: translateX(-50%) translateX(0px) scaleX(0.7); opacity: 0.85; }
            50% { transform: translateX(-50%) translateX(-127px) scaleX(1.5); opacity: 0.35; }
            75% { transform: translateX(-50%) translateX(0px) scaleX(0.7); opacity: 0.85; }
            100% { transform: translateX(-50%) translateX(127px) scaleX(1.5); opacity: 0.35; }
        }

        /* ========== Sweeping Clock 300px ========== */
        .indicator-container svg,
        .clock-container svg {
            width: 100%;
            height: 100%;
        }

        .sweeping-line {
            transition: transform 1s linear;
        }

        .time-label {
            font-family: 'Iceberg', cursive;
            font-size: 17px;
        }

        /* ========== Hour Clock 388px ========== */
        .pointer-group {
            transform-origin: 194px 194px;
            transition: transform 1s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .hour-number {
            font-family: 'Iceberg', sans-serif;
            font-size: 18px;
            font-weight: 400;
            font-style: normal;
            text-anchor: middle;
        }

        @media (max-width: 1200px) {
            .time-system-container {
                gap: 40px;
                transform: scale(0.85);
            }
        }

        @media (max-width: 900px) {
            .time-system-container {
                flex-direction: column;
                gap: 30px;
                transform: scale(0.75);
            }
        }

        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; }
            .trajectory-arc { border-color: #ff7b45; opacity: 0.7; }
            .trajectory-arc:hover { opacity: 1.0; }
        }
    </style>
</head>
<body>
    <div class="time-system-container">
        <!-- 单摆 240px -->
        <div class="pendulum-wrapper">
            <div class="pendulum-container">
                <div class="pendulum-shadow"></div>
                <div class="trajectory-arc"></div>
                
                <svg class="fixed-support" viewBox="0 0 240 150" width="240" height="150">
                    <circle cx="120" cy="93" r="45" fill="#eeeeee"/>
                    <circle cx="120" cy="93" r="11.1" fill="#FF5D1F"/>
                </svg>
                
                <svg class="pendulum-swing-system" viewBox="0 0 240 540">
                    <defs>
                        <radialGradient id="ballGradient" cx="35%" cy="35%">
                            <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
                        </radialGradient>
                        <radialGradient id="highlight" cx="50%" cy="50%">
                            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
                            <stop offset="70%" style="stop-color:#ffffff;stop-opacity:0" />
                        </radialGradient>
                    </defs>
                    <path d="M 99 108 L 141 108 L 141 132 L 142.2 204 Q 151.2 270, 151.5 300 L 88.5 300 Q 88.8 270, 97.8 204 L 99 132 Z" fill="#eeeeee"/>
                    <circle cx="120" cy="384" r="90" fill="url(#ballGradient)" style="filter: drop-shadow(0px 1.2px 2.4px rgba(0,0,0,0.04)) drop-shadow(0px 2.4px 7.2px rgba(0,0,0,0.08))" />
                    <ellipse cx="96" cy="360" rx="27" ry="27" fill="url(#highlight)" />
                </svg>
            </div>
        </div>

        <!-- Sweeping Clock 300px -->
        <div class="indicator-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 -75 300 450">
                <defs>
                    <clipPath id="topHalf">
                        <rect x="0" y="-75" width="300" height="75"/>
                    </clipPath>
                    <clipPath id="bottomHalf">
                        <rect x="0" y="300" width="300" height="75"/>
                    </clipPath>
                    <clipPath id="containerClip">
                        <rect x="84.94" y="0" width="130.12" height="300"/>
                        <circle cx="149.44" cy="300" r="63.9"/>
                    </clipPath>
                </defs>
                
                <rect id="lowerFillRect" fill="#FF5D1F" x="84.94" y="0" width="130.12" height="363.9" clip-path="url(#containerClip)"/>
                <circle cx="149.44" cy="0" r="63.9" stroke="#5E5D61" stroke-width="2" fill="none" clip-path="url(#topHalf)"/>
                
                <rect fill="#5E5D61" height="300" width="2" x="84.94"></rect>
                <rect fill="#5E5D61" height="2" width="5.4" y="10.76" x="79.54"></rect>
                <rect fill="#5E5D61" height="2" width="12" y="70" x="72.94"></rect>
                <rect fill="#5E5D61" height="2" width="5.4" y="107.62" x="79.54"></rect>
                <rect fill="#5E5D61" height="2" width="12" y="195" x="72.94"></rect>
                <rect fill="#5E5D61" height="2" width="5.4" y="215.25" x="79.54"></rect>
                <rect fill="#5E5D61" height="2" width="5.4" y="297.31" x="79.54"></rect>
                
                <rect fill="#5E5D61" height="300" width="2" x="213.06"></rect>
                <rect fill="#5E5D61" height="2" width="5.4" y="273.09" x="215.06"></rect>
                <rect fill="#5E5D61" height="2" width="5.4" y="231.39" x="215.06"></rect>
                <rect fill="#5E5D61" height="2" width="5.4" y="169.51" x="215.06"></rect>
                <rect fill="#5E5D61" height="2" width="12" y="115" x="215.06"></rect>
                <rect fill="#5E5D61" height="2" width="5.4" y="43.05" x="215.06"></rect>
                <rect fill="#5E5D61" height="2" width="5.4" x="215.06"></rect>
                
                <circle cx="149.44" cy="300" r="63.9" stroke="#5E5D61" stroke-width="2" fill="none" clip-path="url(#bottomHalf)"/>
                
                <text id="label14s" class="time-label" x="60" y="76.5" text-anchor="end">14s</text>
                <text id="label23s" class="time-label" x="240" y="121.5" text-anchor="start">23s</text>
                <text id="label39s" class="time-label" x="60" y="202.5" text-anchor="end">39s</text>
                
                <rect id="sweepingLine" class="sweeping-line" fill="#FF5D1F" height="3" width="192.4" y="0" x="53.25"></rect>
            </svg>
        </div>

        <!-- Hour Clock 388px -->
        <div class="clock-container">
            <svg width="388" height="388" viewBox="0 0 388 388" fill="none">
                <circle cx="194" cy="194" r="96" stroke="#5E5D61" stroke-width="2.2"/>
                <g id="numberContainer"></g>
                <g id="pointerGroup" class="pointer-group">
                    <path d="M194.85 110.36L200.61 119.12C201.1 119.86 200.58 120.85 199.7 120.87L187.81 121.1C186.91 121.12 186.36 120.1 186.87 119.35L192.87 110.33C193.32 109.66 194.32 109.67 194.85 110.36Z" fill="#5E5D61"/>
                </g>
            </svg>
        </div>
    </div>

    <script>
        // Sweeping Line Clock
        const sweepingLine = document.getElementById('sweepingLine');
        const lowerFillRect = document.getElementById('lowerFillRect');
        const label14s = document.getElementById('label14s');
        const label23s = document.getElementById('label23s');
        const label39s = document.getElementById('label39s');

        function updateSweepingLine() {
            const now = new Date();
            const seconds = now.getSeconds();
            const yPosition = (seconds / 60) * 300;
            sweepingLine.setAttribute('y', yPosition);
            const fillHeight = 363.9 - yPosition;
            lowerFillRect.setAttribute('y', yPosition);
            lowerFillRect.setAttribute('height', fillHeight);
            label14s.setAttribute('fill', seconds >= 14 ? 'rgba(255, 93, 31, 0.4)' : 'rgba(255, 93, 31, 1)');
            label23s.setAttribute('fill', seconds >= 23 ? 'rgba(255, 93, 31, 0.4)' : 'rgba(255, 93, 31, 1)');
            label39s.setAttribute('fill', seconds >= 39 ? 'rgba(255, 93, 31, 0.4)' : 'rgba(255, 93, 31, 1)');
        }

        // Hour Clock
        const SVG_NS = "http://www.w3.org/2000/svg";
        const numberContainer = document.getElementById('numberContainer');
        const pointerGroup = document.getElementById('pointerGroup');
        const centerX = 194, centerY = 194, radius = 108.5;
        
        function createNumber(hour, angle, opacity, showH = false) {
            const radian = (angle - 90) * Math.PI / 180;
            const x = centerX + radius * Math.cos(radian);
            const y = centerY + radius * Math.sin(radian);
            const text = document.createElementNS(SVG_NS, 'text');
            text.setAttribute('class', 'hour-number');
            text.setAttribute('x', x);
            text.setAttribute('y', y);
            text.setAttribute('fill', `rgba(255, 93, 31, ${opacity})`);
            text.setAttribute('dominant-baseline', 'alphabetic');
            const numberSpan = document.createElementNS(SVG_NS, 'tspan');
            numberSpan.textContent = String(hour).padStart(2, '0');
            numberSpan.setAttribute('font-size', '18');
            text.appendChild(numberSpan);
            if (showH) {
                const hSpan = document.createElementNS(SVG_NS, 'tspan');
                hSpan.textContent = 'h';
                hSpan.setAttribute('font-size', '14');
                hSpan.setAttribute('baseline-shift', '0');
                text.appendChild(hSpan);
            }
            let rotationAngle = angle;
            if (angle > 90 && angle < 270) rotationAngle = angle + 180;
            text.setAttribute('transform', `rotate(${rotationAngle} ${x} ${y})`);
            return text;
        }
        
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const currentHourAngle = ((hours % 12) + minutes / 60) * 30;
            const currentHour12 = hours % 12;
            const nextHour12 = (currentHour12 + 1) % 12;
            numberContainer.innerHTML = '';
            if (minutes === 0) {
                const angle = currentHour12 * 30;
                numberContainer.appendChild(createNumber(hours, angle, 1, false));
            } else {
                const currentAngle = currentHour12 * 30;
                const nextAngle = nextHour12 * 30;
                numberContainer.appendChild(createNumber(hours, currentAngle, 1, false));
                const nextHourValue = (hours + 1) % 24;
                numberContainer.appendChild(createNumber(nextHourValue, nextAngle, 0.4, true));
            }
            pointerGroup.style.transform = `rotate(${currentHourAngle}deg)`;
        }

        updateSweepingLine();
        updateClock();
        setInterval(() => { updateSweepingLine(); updateClock(); }, 1000);
    </script>
</body>
</html>
