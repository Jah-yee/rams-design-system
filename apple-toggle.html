<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Style Toggle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .toggle-container {
            position: relative;
            width: 200px;
            height: 100px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* 背景轨道 */
        .toggle-track {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50px;
            background-color: rgb(227, 227, 227);
            box-shadow: inset 1px 1px 2px 0px rgba(0, 0, 0, 0.25);
            transition: background-color 0.5s cubic-bezier(0.17, 0.67, 0.16, 0.99);
        }

        .toggle-container.active .toggle-track {
            background-color: #ed6c35;
        }

        /* Knob容器 */
        .knob-wrapper {
            position: absolute;
            top: 50%;
            left: 10px;
            width: 80px;
            height: 80px;
            transform: translateY(-50%);
            transition: 
                left 0.5s cubic-bezier(0.17, 0.67, 0.16, 0.99),
                transform 0.5s cubic-bezier(0.17, 0.67, 0.16, 0.99);
        }

        .toggle-container.active .knob-wrapper {
            left: calc(100% - 90px);
        }

        /* 点击时的squash效果 */
        .toggle-container.pressing .knob-wrapper {
            transform: translateY(-50%) scaleX(1.08) scaleY(0.95);
        }

        /* 移动时的stretch效果 */
        .toggle-container.moving-right .knob-wrapper {
            transform: translateY(-50%) scaleX(1.15) scaleY(0.92);
        }

        .toggle-container.moving-left .knob-wrapper {
            transform: translateY(-50%) scaleX(1.15) scaleY(0.92);
        }

        /* Knob的外层阴影 */
        .knob-shadow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgb(255, 255, 255) 13.5%, rgb(227, 227, 227) 86.9%);
            box-shadow:
                0.59px 0.59px 1.16px -0.47px rgba(0, 0, 0, 0.26),
                1.39px 1.39px 2.76px -0.94px rgba(0, 0, 0, 0.26),
                2.54px 2.54px 5.03px -1.41px rgba(0, 0, 0, 0.25),
                4.23px 4.23px 8.37px -1.88px rgba(0, 0, 0, 0.24),
                6.82px 6.82px 13.51px -2.34px rgba(0, 0, 0, 0.23),
                11.17px 11.17px 22.11px -2.81px rgba(0, 0, 0, 0.21),
                19.23px 19.23px 38.08px -3.28px rgba(0, 0, 0, 0.17),
                35px 35px 69.3px -3.75px rgba(0, 0, 0, 0.09);
        }

        /* Knob主体 */
        .knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            height: 70px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: linear-gradient(180deg, rgb(242, 242, 242) 0%, rgb(232, 232, 232) 100%);
        }

        /* 辅助信息 */
        .info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #999;
            font-size: 14px;
            text-align: center;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .toggle-container {
                width: 160px;
                height: 80px;
            }

            .knob-wrapper {
                width: 64px;
                height: 64px;
            }

            .knob {
                width: 56px;
                height: 56px;
            }

            .toggle-container.active .knob-wrapper {
                left: calc(100% - 74px);
            }
        }
    </style>
</head>
<body>
    <div class="toggle-container" id="toggle">
        <div class="toggle-track"></div>
        <div class="knob-wrapper">
            <div class="knob-shadow"></div>
            <div class="knob"></div>
        </div>
    </div>

    <div class="info">
        点击切换 · Apple风格非线性动画<br>
        <small>cubic-bezier easing + squash & stretch</small>
    </div>

    <script>
        const toggle = document.getElementById('toggle');
        let isActive = false;
        let isAnimating = false;

        toggle.addEventListener('click', () => {
            if (isAnimating) return;
            
            isActive = !isActive;
            isAnimating = true;

            // 添加按压效果
            toggle.classList.add('pressing');
            
            setTimeout(() => {
                toggle.classList.remove('pressing');
                
                // 添加移动方向的stretch效果
                if (isActive) {
                    toggle.classList.add('moving-right');
                    toggle.classList.add('active');
                } else {
                    toggle.classList.add('moving-left');
                    toggle.classList.remove('active');
                }
                
                // 移除stretch效果
                setTimeout(() => {
                    toggle.classList.remove('moving-right', 'moving-left');
                    isAnimating = false;
                }, 250); // stretch持续时间（动画前半段）
                
            }, 100); // 按压持续时间
        });

        // 添加hover效果（可选）
        toggle.addEventListener('mouseenter', () => {
            toggle.style.opacity = '0.9';
        });

        toggle.addEventListener('mouseleave', () => {
            toggle.style.opacity = '1';
        });

        // 防止拖动选择
        toggle.addEventListener('selectstart', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
